  @ -0,0 +1,53 @@
  name: Project CI

  on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

  env:
    JAVA_VERSION: 17

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: ${{ env.JAVA_VERSION }}
            cache: gradle
        - run: chmod +x gradlew
        - name: Build all targets
          run: ./gradlew build

    lint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: ${{ env.JAVA_VERSION }}
            cache: gradle
        - run: chmod +x gradlew
        - name: Run Detekt
          run: ./gradlew detekt

    test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: ${{ env.JAVA_VERSION }}
            cache: gradle
        - run: chmod +x gradlew
        - name: Run all tests
          run: ./gradlew allTests